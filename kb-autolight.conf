[thresholds]
# Ambient light sensor value below which the keyboard backlight turns ON.
# Lower values = darker room required to trigger the backlight.
dark = 0

# Ambient light sensor value above which the keyboard backlight turns OFF.
# Must be greater than 'dark'.
light = 1

[backlight]
# Keyboard backlight brightness (0-100) when in dark mode.
brightness = 1

# Keyboard backlight device name (from /sys/class/leds/).
# Leave blank to auto-detect (searches for *kbd_backlight).
# Override if auto-detection picks the wrong device, e.g.:
# device = chromeos::kbd_backlight
device =

[polling]
# How often to read the ambient light sensor, in seconds.
interval = 1

# Number of consecutive readings past the threshold before switching.
# Prevents flickering from brief sensor fluctuations.
debounce = 3

[sensor]
# Full path to the ambient light sensor sysfs file.
# Leave blank to auto-detect (searches /sys/bus/iio/devices/iio:device*/in_illuminance_raw).
# Override if auto-detection picks the wrong device, e.g.:
# device = /sys/bus/iio/devices/iio:device0/in_illuminance_raw
device =
